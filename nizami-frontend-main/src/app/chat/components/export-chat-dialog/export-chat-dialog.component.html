<div class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm flex items-center justify-center z-50 w-full text-center xl:text-start">
  <div class="bg-white rounded-2xl shadow-xl p-8 m-6 xl:m-0 xl:w-[520px]">
    <div class="flex justify-center mb-4">
      <img src="/assets/icons/document-green.svg" alt="Export" class="w-10 h-10">
    </div>

    <h2 class="text-2xl font-semibold mb-3 text-grey6 text-center">{{ 'export_chat_success_title' | translate }}</h2>
    <p class="text-grey6 mb-6 text-base leading-relaxed text-center">{{ 'export_chat_success_message' | translate }}</p>

    <div class="flex flex-col gap-3">
      <button
        class="w-full px-4 py-3 bg-blue1 hover:bg-purple5 text-white rounded-lg font-medium"
        (click)="downloadPdf()"
      >
        {{ 'export_download_pdf' | translate }}
      </button>

      <button
        class="w-full px-4 py-3 border border-grey3 hover:bg-grey1 text-grey6 rounded-lg font-medium flex items-center justify-center gap-2"
        (click)="copyShareLink()"
      >
        @if (linkCopied()) {
          <img src="/assets/icons/check.svg" alt="Copied" class="w-4 h-4">
          {{ 'export_link_copied' | translate }}
        } @else {
          {{ 'export_copy_share_link' | translate }}
        }
      </button>

      <button
        class="w-full px-4 py-2 bg-white text-black hover:bg-grey1 border rounded-lg"
        (click)="close()"
      >
        {{ 'close' | translate }}
      </button>
    </div>
  </div>
</div>
