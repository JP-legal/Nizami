version: 1
applications:
  - appRoot: nizami-frontend-main
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@10.33.0 --activate
            - pnpm --version
            - pnpm config set store-dir .pnpm-store
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm build
      artifacts:
        baseDirectory: dist/nizami-frontend
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .pnpm-store/**/*
